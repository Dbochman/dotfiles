# Dylan's tmux config - mobile-friendly

# ============================================
# PREFIX KEY
# ============================================
# Ctrl-a is easier to hit on mobile keyboards than Ctrl-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ============================================
# MOUSE SUPPORT
# ============================================
# Essential for mobile - scroll and select with touch
set -g mouse on

# ============================================
# QUALITY OF LIFE
# ============================================
# Start window numbering at 1 (0 is far on mobile keyboards)
set -g base-index 1
setw -g pane-base-index 1

# Increase scrollback buffer
set -g history-limit 10000

# Faster key repetition
set -s escape-time 0

# Renumber windows when one is closed
set -g renumber-windows on

# ============================================
# EASY SPLITS (more intuitive keys)
# ============================================
# | for vertical split, - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================
# EASY PANE NAVIGATION
# ============================================
# Use Alt + arrow keys to switch panes (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ============================================
# STATUS BAR
# ============================================
# Make it readable on small screens
set -g status-position bottom
set -g status-style 'bg=#333333 fg=#ffffff'
set -g status-left ' #S '
set -g status-left-length 20
set -g status-right ' %H:%M '
set -g status-right-length 20

# Window status
setw -g window-status-current-style 'bg=#555555 fg=#ffffff bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '

# ============================================
# RELOAD CONFIG
# ============================================
# Prefix + r to reload this config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ============================================
# QUICK SHORTCUTS
# ============================================
# Prefix + k to kill current pane (with confirmation)
bind k confirm-before -p "Kill pane? (y/n)" kill-pane

# Prefix + K to kill current window
bind K confirm-before -p "Kill window? (y/n)" kill-window
